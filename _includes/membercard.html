<div class="col-lg-3 col-md-4 col-sm-6 mb-4">
    <div class="card h-100 border-0 shadow-sm text-center p-0 team-card" style="border-radius: 12px; transition: all 0.3s ease; overflow: hidden;">
        <div style="width: 100%; height: 250px; overflow: hidden; margin-bottom: 0;">
            <img src="{{ site.baseurl }}/assets/images/Members/{{ include.image }}" alt="{{ include.name }}" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="card-body p-3">
            <h5 class="font-weight-bold mb-1" style="font-size: 1.1rem;">{{ include.name }}</h5>
            <p class="text-muted small mb-0">{{ include.role }}</p>
        </div>
    </div>
</div>
