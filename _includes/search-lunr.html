<script src="{{site.baseurl}}/assets/js/lunr.js"></script>


<style>
    .lunrsearchresult .title {color: #d9230f;}
    .lunrsearchresult .url {color: silver;}
    .lunrsearchresult a {display: block; color: #777;}
    .lunrsearchresult a:hover, .lunrsearchresult a:focus {text-decoration: none;}
    .lunrsearchresult a:hover .title {text-decoration: underline;}
</style>


<div class="lunrsearch-wrapper" style="position: relative;">
    <form class="bd-search" onSubmit="return lunr_search(document.getElementById('lunrsearch').value);">
        <input type="text" class="form-control text-small launch-modal-search" id="lunrsearch" name="q" maxlength="255" value="" placeholder="Search..."/>
    </form>
    <div id="lunrsearchresults" style="display:none;">

      <div class="search-box">

        <div id="modtit"></div>

        <ul class="mb-0"></ul>

        <button class="btn btn-danger btn-sm btnx">Close</button>

      </div>
    </div>
</div>
<style>
#lunrsearchresults {
    position: absolute;
    top: 100%;
    right: 0;
    z-index: 1020;
    width: 600px;
    max-width: 90vw;
}

/* search box above everything */
.search-box {
    position: relative;
    z-index: 2;
    padding: 2pc;
    width: 100%;
    margin-top: 10px;

    background: #111;
    color: white;
    border-radius: 12px;

    max-height: 70vh;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.7);
}

/* scroll only results */
.search-box ul {
    max-height: 50vh;
    overflow-y: auto;
    padding-bottom: 20px;
}
.search-box::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 12px;
    padding: 5px;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.9),
        transparent

    );
    background-size: 300% 300%;
    animation: moveBorder 8s linear infinite;

    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;

    pointer-events: none;
}

@keyframes moveBorder {
    0% {
        background-position: 0% 50%;

    }
    100% {
        background-position: 200% 50%;
    }
}

@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,500&display=swap');

#modtit, 
#modtit * {
    font-family: 'Lora', serif !important;
    font-weight: 500;
    font-style: italic;
}
/* prevent background interaction */
body.modal-open {
    overflow: hidden;
}
.btnx {
    margin-top: 15px;
}
</style>
<script src="{{site.baseurl}}/assets/js/lunrsearchengine.js"></script>
