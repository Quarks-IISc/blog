<div class="section-title section-hero-header">
    <h2 style="font-size: 2.5rem;">CROSSWORDS</h2>
</div>
<div class="mt-4 text-center d-flex flex-column align-items-center justify-content-center" style="min-height: 400px; background: rgba(128,128,128,0.05); border-radius: 15px; padding: 30px;">
    <div class="crossword-visual mb-4 fade-up-element">
        <div class="cw-grid">
            <!-- Row 0 -->
            <div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile black"></div>
            
            <!-- Row 1: MINI start -->
            <div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile">M<span class="cw-number">1</span></div><div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile black"></div>
            
            <!-- Row 2: MINI cont -->
            <div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile">I</div><div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile black"></div>
            
            <!-- Row 3: Vertical starts (Q, N, S) -->
            <div class="cw-tile black"></div><div class="cw-tile">Q<span class="cw-number">2</span></div><div class="cw-tile black"></div><div class="cw-tile">N</div><div class="cw-tile">S<span class="cw-number">3</span></div><div class="cw-tile black"></div><div class="cw-tile black"></div>
            
            <!-- Row 4: CURIOUS bridge, intersects QUARKS (U), MINI (I), SOLVE (O) -->
            <div class="cw-tile">C<span class="cw-number">4</span></div><div class="cw-tile">U</div><div class="cw-tile">R</div><div class="cw-tile">I</div><div class="cw-tile">O</div><div class="cw-tile">U</div><div class="cw-tile">S</div>
            
            <!-- Row 5: Vertical cont (A, L) -->
            <div class="cw-tile black"></div><div class="cw-tile">A</div><div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile">L</div><div class="cw-tile black"></div><div class="cw-tile black"></div>
            
            <!-- Row 6: Vertical cont (R, V) -->
            <div class="cw-tile black"></div><div class="cw-tile">R</div><div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile">V</div><div class="cw-tile black"></div><div class="cw-tile black"></div>
            
            <!-- Row 7: Vertical cont (K, E) -->
            <div class="cw-tile black"></div><div class="cw-tile">K</div><div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile">E</div><div class="cw-tile black"></div><div class="cw-tile black"></div>
            
            <!-- Row 8: Vertical end (S) -->
            <div class="cw-tile black"></div><div class="cw-tile">S</div><div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile black"></div><div class="cw-tile black"></div>
        </div>
    </div>
    <p class="powerful-intro-text mb-4" style="font-size: 1.3rem;">Stay Curious, Solve Quarks Mini Crossword.</p>
    <a href="{{ site.baseurl }}/crosswords" class="magazine-link" style="font-size: 1.2rem;">Solve Today's Mini <span class="arrow">&xrarr;</span></a>
</div>
