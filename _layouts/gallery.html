---
layout: default
---
<h1>Pictures</h1>

<div class="row listrecent">
  {% for picture in page.pictures %}
  <div class="col-lg-4 col-md-6 mb-30px">
    <div class="card h-100 picture-card" style="border: none; border-radius: 8px; overflow: hidden; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.08); min-height: 280px; background: #000;">
        <div style="display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0;">
            <img class="img-fluid" src="{{ picture.image }}" alt="{{ picture.name }}" style="width: 100%; height: 100%; object-fit: cover; display: block;">
            
            <div class="picture-overlay" style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, transparent 100%); padding: 30px 15px 15px; text-align: left; transition: all 0.3s ease; z-index: 2; transform: translateZ(0); backface-visibility: hidden;">
                <h2 class="card-title" style="font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 2px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">
                    {{ picture.name }}
                </h2>
                <p class="pictures-desc" style="font-size: 0.85rem; color: #ddd; margin-bottom: 0; text-shadow: 0 1px 2px rgba(0,0,0,0.5);">
                    {{ picture.description }}
                </p>
            </div>
        </div>
    </div>
  </div>
  {% endfor %}
</div>

{{ content }}
