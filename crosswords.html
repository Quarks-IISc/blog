---
layout: default
title: Crosswords
---

<div style="height: 120px; width: 100%;"></div>

<div class="crossword-page-container pt-5 mt-5">
  <div class="text-center mb-5">
    <h1 class="puz-main-title font-weight-bold" style="font-family: 'Playfair Display', serif; font-size: 3rem;">Mini Crossword</h1>
    <h5 id="puz-date" class="puz-sub-text text-muted mb-2"></h5>
    <p class="puz-sub-text mb-1" style="font-size: 1.1rem;">By <strong>Ananth</strong></p>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-7 text-center mb-5">
      <div id="crossword-container" class="d-inline-block">
        <div id="crossword-grid" class="crossword-grid"></div>
        <div class="mt-4 d-flex justify-content-center" style="gap: 15px;">
          <button class="btn btn-primary btn-lg" onclick="checkPuzzle()">Check Puzzle</button>
          <button class="btn btn-outline-secondary btn-lg" onclick="resetPuzzle()">Reset</button>
        </div>
        <div id="status-msg" class="mt-4 font-weight-bold" style="min-height: 30px; font-size: 1.2rem;"></div>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="clues-container p-4" style="min-height: 400px;">
        <div class="row">
          <div class="col-6">
            <h5 class="font-weight-bold border-bottom pb-2 mb-3">ACROSS</h5>
            <ul id="across-clues" class="list-unstyled small text-start clue-list"></ul>
          </div>
          <div class="col-6">
            <h5 class="font-weight-bold border-bottom pb-2 mb-3">DOWN</h5>
            <ul id="down-clues" class="list-unstyled small text-start clue-list"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  :root {
    --puz-bg: #000000;
    --puz-text: #ffffff;
    --puz-line: #444444;
    --puz-num: #ff9800; 
    --puz-clue-bg: rgba(0,0,0,0.05);
    --puz-highlight: #FFD54F; /* Warm Yellow */
  }

  body.dark :root, body[data-theme='dark'] :root, html[data-theme='dark'] :root {
    --puz-bg: #ffffff;
    --puz-text: #000000;
    --puz-line: #cccccc;
    --puz-clue-bg: rgba(255,255,255,0.1);
  }

  .crossword-grid { 
    display: grid; gap: 1px; background: var(--puz-line); border: 5px solid var(--puz-line); 
    margin: 0 auto; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .crossword-cell { width: 48px; height: 48px; background: var(--puz-bg); position: relative; }
  .crossword-cell.block { background: var(--puz-line); }

  .crossword-cell input { 
    width: 100%; height: 100%; border: none; text-align: center; 
    font-size: 1.5rem; font-weight: bold; text-transform: uppercase;
    background: transparent; outline: none; color: var(--puz-text);
    transition: all 0.1s ease;
  }

  /* Warm Yellow Highlight for active box */
  .crossword-cell input:focus {
    background: rgba(255, 213, 79, 0.15) !important;
    border: 3px solid var(--puz-highlight) !important;
    box-shadow: 0 0 10px rgba(255, 213, 79, 0.6);
    z-index: 20;
    position: relative;
  }

  .cell-number { position: absolute; top: 2px; left: 4px; font-size: 0.75rem; color: var(--puz-num); pointer-events: none; }

  .correct input { color: #28a745 !important; font-weight: 900; }
  .incorrect input { color: #dc3545 !important; text-decoration: line-through; }

  .clues-container { background: var(--puz-clue-bg); border-radius: 12px; border: 1px solid rgba(128,128,128,0.2); }
  .clue-list li { margin-bottom: 8px; cursor: pointer; transition: opacity 0.2s; }
  .clue-list li:hover { opacity: 0.7; color: var(--puz-num); }
</style>

<script>
(function() {
    let direction = 'across';
    let currentPuzzle = null;

    class PuzParser {
        constructor(buffer) {
            this.data = new Uint8Array(buffer);
            this.view = new DataView(buffer);
        }
        parse() {
            try {
                const width = this.data[0x2C], height = this.data[0x2D];
                const gridSize = width * height;
                const numClues = this.view.getUint16(0x2E, true);
                const solution = new TextDecoder().decode(this.data.slice(0x34, 0x34 + gridSize));
                let offset = 0x34 + (gridSize * 2);
                const strings = [];
                while (strings.length < (numClues + 4) && offset < this.data.length) {
                    let start = offset;
                    while (offset < this.data.length && this.data[offset] !== 0) offset++;
                    strings.push(new TextDecoder().decode(this.data.slice(start, offset)));
                    offset++;
                }
                return { width, height, solution, clues: strings.slice(3) };
            } catch (e) { return null; }
        }
    }

    window.initPuz = async function(url) {
        try {
            const response = await fetch(url);
            const buffer = await response.arrayBuffer();
            currentPuzzle = new PuzParser(buffer).parse();
            if (currentPuzzle) renderPuzzle();
            document.getElementById('puz-date').textContent = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
        } catch (e) { console.error("Load fail", e); }
    };

    function renderPuzzle() {
        const gridEl = document.getElementById('crossword-grid');
        gridEl.style.gridTemplateColumns = `repeat(${currentPuzzle.width}, 48px)`;
        gridEl.innerHTML = '';
        const acrossEl = document.getElementById('across-clues'), downEl = document.getElementById('down-clues');
        acrossEl.innerHTML = ''; downEl.innerHTML = '';
        let clueIdx = 0, cellCounter = 1;

        for (let i = 0; i < currentPuzzle.solution.length; i++) {
            const r = Math.floor(i / currentPuzzle.width), c = i % currentPuzzle.width;
            if (currentPuzzle.solution[i] === '.') {
                gridEl.appendChild(Object.assign(document.createElement('div'), {className: 'crossword-cell block'}));
                continue;
            }

            const isA = (c === 0 || currentPuzzle.solution[i-1] === '.') && (c+1 < currentPuzzle.width && currentPuzzle.solution[i+1] !== '.');
            const isD = (r === 0 || currentPuzzle.solution[i-currentPuzzle.width] === '.') && (r+1 < currentPuzzle.height && currentPuzzle.solution[i+currentPuzzle.width] !== '.');
            
            const cell = document.createElement('div');
            cell.className = 'crossword-cell';
            if (isA || isD) {
                cell.innerHTML = `<span class="cell-number">${cellCounter}</span>`;
                const currentIdx = i;

                if (isA) {
                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${cellCounter}</strong> ${currentPuzzle.clues[clueIdx++] || ''}`;
                    li.onclick = () => { direction = 'across'; focusBox(currentIdx); };
                    acrossEl.appendChild(li);
                }
                if (isD) {
                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${cellCounter}</strong> ${currentPuzzle.clues[clueIdx++] || ''}`;
                    li.onclick = () => { direction = 'down'; focusBox(currentIdx); };
                    downEl.appendChild(li);
                }
                cellCounter++;
            }

            const input = document.createElement('input');
            input.maxLength = 1;
            input.dataset.index = i;
            input.addEventListener('click', () => { if(document.activeElement === input) direction = direction === 'across' ? 'down' : 'across'; });
            input.addEventListener('keydown', (e) => {
                if(e.key === 'Backspace' && !input.value) moveFocus(i, -1);
                else if(e.key.startsWith('Arrow')) {
                    e.preventDefault();
                    if(e.key === 'ArrowRight') { direction = 'across'; moveFocus(i, 1); }
                    if(e.key === 'ArrowLeft') { direction = 'across'; moveFocus(i, -1); }
                    if(e.key === 'ArrowDown') { direction = 'down'; moveFocus(i, 1); }
                    if(e.key === 'ArrowUp') { direction = 'down'; moveFocus(i, -1); }
                }
            });
            input.addEventListener('input', () => { if(input.value) moveFocus(i, 1); });
            cell.appendChild(input);
            gridEl.appendChild(cell);
        }
    }

    function focusBox(idx) {
        const el = document.querySelector(`input[data-index="${idx}"]`);
        if(el) el.focus();
    }

    function moveFocus(idx, step) {
        const next = idx + (direction === 'across' ? step : step * currentPuzzle.width);
        const el = document.querySelector(`input[data-index="${next}"]`);
        if(el && !el.parentElement.classList.contains('block')) el.focus();
    }

    window.checkPuzzle = function() {
        const inputs = document.querySelectorAll('.crossword-cell input');
        const msg = document.getElementById('status-msg');
        if (Array.from(inputs).some(i => i.value.trim() === "")) {
            msg.textContent = "Keep going!";
            msg.style.color = "orange";
            return;
        }
        let win = true;
        inputs.forEach(input => {
            const sol = currentPuzzle.solution[input.dataset.index].toUpperCase();
            if (input.value.toUpperCase() === sol) {
                input.parentElement.classList.add('correct');
                input.parentElement.classList.remove('incorrect');
            } else {
                input.parentElement.classList.add('incorrect');
                input.parentElement.classList.remove('correct');
                win = false; 
            }
        });
        msg.textContent = win ? "Solved! 🎉" : "Keep going!";
        msg.style.color = win ? "#28a745" : "#dc3545";
    };

    window.resetPuzzle = function() {
        document.querySelectorAll('.crossword-cell input').forEach(i => { i.value = ''; i.parentElement.classList.remove('correct', 'incorrect'); });
        document.getElementById('status-msg').textContent = "";
    };
})();

document.addEventListener('DOMContentLoaded', () => initPuz("{{ site.baseurl }}/crossword_data/Mar_26.puz"));
</script>
