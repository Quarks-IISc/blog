---
layout: default
title: Crosswords
---

<div class="container py-5 mt-5">
    <div class="section-title section-hero-header mb-5">
        <h2 style="font-size: 2.5rem;">CROSSWORDS</h2>
    </div>

    <div class="row fade-up-element">
        <!-- Left: Crossword Grid -->
        <div class="col-lg-7 mb-5 text-center">
            <div id="crossword-container" class="d-inline-block">
                <div class="crossword-grid" id="crossword-grid"></div>
                
                <div class="mt-4 d-flex justify-content-center align-items-center flex-wrap" style="gap: 20px;">
                    <button class="magazine-link border-0 bg-transparent p-0" onclick="checkCrossword()">Check Crossword <span class="arrow">&xrarr;</span></button>
                    <button class="magazine-link border-0 bg-transparent p-0 text-muted" onclick="resetCrossword()" style="font-size: 1.1rem;">Reset</button>
                </div>
                <div id="check-message" class="mt-3 font-weight-bold" style="min-height: 24px;"></div>
            </div>
        </div>

        <!-- Right: Clues -->
        <div class="col-lg-5">
            <div class="clues-container p-4" style="background: rgba(128,128,128,0.05); border-radius: 15px;">
                <h3 class="font-weight-bold mb-4" style="font-family: 'Playfair Display', serif;">Clues</h3>
                
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <h5 class="text-uppercase font-weight-bold border-bottom pb-2 clue-header" style="letter-spacing: 1px; font-size: 0.85rem; color: #fff;">Across</h5>
                        <ul class="list-unstyled mt-3" id="across-clues"></ul>
                    </div>
                    <div class="col-md-6">
                        <h5 class="text-uppercase font-weight-bold border-bottom pb-2 clue-header" style="letter-spacing: 1px; font-size: 0.85rem; color: #fff;">Down</h5>
                        <ul class="list-unstyled mt-3" id="down-clues"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    :root {
        --cell-size: clamp(45px, 9vw, 65px);
        --accent-color: #000;
        --border-color: #ddd;
        --highlight-color: rgba(0, 123, 255, 0.1);
        --active-cell-color: rgba(0, 123, 255, 0.2);
    }

    .dark-mode {
        --accent-color: #fff;
        --border-color: #333;
        --highlight-color: rgba(255, 255, 255, 0.1);
        --active-cell-color: rgba(255, 255, 255, 0.2);
    }

    .clue-header {
        color: #fff !important;
    }

    .crossword-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 0;
        border: 1px solid var(--border-color);
        background: transparent;
    }

    .crossword-cell {
        width: var(--cell-size);
        height: var(--cell-size);
        background: transparent;
        border: 1px solid var(--border-color);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .crossword-cell.block {
        background: #fff !important;
        border: 1px solid #fff !important;
    }

    .crossword-cell input {
        width: 100%;
        height: 100%;
        border: none;
        background: transparent;
        text-align: center;
        font-size: 1.5rem;
        font-weight: 700;
        text-transform: uppercase;
        color: inherit;
        outline: none;
        cursor: pointer;
    }

    .crossword-cell .cell-number {
        position: absolute;
        top: 2px;
        left: 4px;
        font-size: 0.7rem;
        font-weight: 700;
        color: #888;
        line-height: 1;
    }

    .crossword-cell.active-word {
        background-color: var(--highlight-color) !important;
    }
    
    .crossword-cell.focused-cell {
        background-color: var(--active-cell-color) !important;
    }

    .clue-item {
        font-size: 0.95rem;
        margin-bottom: 12px;
        line-height: 1.4;
        cursor: pointer;
        padding: 4px;
        border-radius: 4px;
        transition: background 0.2s;
    }

    .clue-item:hover {
        background: rgba(128,128,128,0.1);
    }

    .clue-item.active-clue {
        background: var(--highlight-color);
        font-weight: 600;
    }

    .clue-n {
        font-weight: 700;
        margin-right: 6px;
        color: var(--accent-color);
    }

    .crossword-cell.correct input { color: #28a745 !important; }
    .crossword-cell.incorrect input { color: #dc3545 !important; }
</style>

<script>
    const crosswordData = {{ site.data.crosswords['mini-2'] | jsonify }};
    const gridEl = document.getElementById('crossword-grid');
    const acrossCluesEl = document.getElementById('across-clues');
    const downCluesEl = document.getElementById('down-clues');
    const msgEl = document.getElementById('check-message');

    let grid = [];
    let currentDir = 'across';

    function init() {
        const [rows, cols] = crosswordData.size;
        gridEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        
        for (let r = 1; r <= rows; r++) {
            grid[r] = [];
            for (let c = 1; c <= cols; c++) {
                grid[r][c] = { isBlock: false, n: null, clues: { across: null, down: null } };
            }
        }

        crosswordData.blocks.forEach(([r, c]) => grid[r][c].isBlock = true);

        crosswordData.across.forEach(clue => {
            const r = clue.where;
            let startC = -1;
            for(let c=1; c<=cols; c++) { if(!grid[r][c].isBlock) { startC = c; break; } }
            if(startC !== -1) {
                grid[r][startC].n = clue.n;
                for(let c=startC; c<=cols && !grid[r][c].isBlock; c++) {
                    grid[r][c].clues.across = clue;
                }
            }
            renderClue(clue, 'across');
        });

        crosswordData.down.forEach(clue => {
            const c = clue.where;
            let startR = -1;
            for(let r=1; r<=rows; r++) { if(!grid[r][c].isBlock) { startR = r; break; } }
            if(startR !== -1) {
                if(!grid[startR][c].n) grid[startR][c].n = clue.n;
                for(let r=startR; r<=rows && !grid[r][c].isBlock; r++) {
                    grid[r][c].clues.down = clue;
                }
            }
            renderClue(clue, 'down');
        });

        for (let r = 1; r <= rows; r++) {
            for (let c = 1; c <= cols; c++) {
                const cell = document.createElement('div');
                cell.className = 'crossword-cell';
                if (grid[r][c].isBlock) {
                    cell.classList.add('block');
                } else {
                    if (grid[r][c].n) {
                        const num = document.createElement('div');
                        num.className = 'cell-number';
                        num.textContent = grid[r][c].n;
                        cell.appendChild(num);
                    }
                    const input = document.createElement('input');
                    input.maxLength = 1;
                    input.dataset.r = r;
                    input.dataset.c = c;
                    input.addEventListener('focus', () => handleFocus(r, c));
                    input.addEventListener('input', (e) => handleInput(e, r, c));
                    input.addEventListener('keydown', (e) => handleKeydown(e, r, c));
                    cell.appendChild(input);
                }
                gridEl.appendChild(cell);
            }
        }
    }

    function renderClue(clue, dir) {
        const li = document.createElement('li');
        li.className = 'clue-item';
        li.id = `clue-${dir}-${clue.n}`;
        li.innerHTML = `<span class="clue-n">${clue.n}.</span> ${clue.clue}`;
        li.onclick = () => {
            const startCell = findStartCell(clue, dir);
            focusCell(startCell.r, startCell.c);
            updateUI(startCell.r, startCell.c, { dir, clue });
        };
        (dir === 'across' ? acrossCluesEl : downCluesEl).appendChild(li);
    }

    function findStartCell(clue, dir) {
        const [rows, cols] = crosswordData.size;
        if(dir === 'across') {
            for(let c=1; c<=cols; c++) if(grid[clue.where][c].clues.across === clue) return {r: clue.where, c: c};
        } else {
            for(let r=1; r<=rows; r++) if(grid[r][clue.where].clues.down === clue) return {r: r, c: clue.where};
        }
        return null;
    }

    function handleFocus(r, c) {
        const cellClues = grid[r][c].clues;
        if (!cellClues[currentDir] && cellClues[currentDir === 'across' ? 'down' : 'across']) {
            currentDir = (currentDir === 'across' ? 'down' : 'across');
        }
        updateUI(r, c);
    }

    function updateUI(r, c, specificClue = null) {
        document.querySelectorAll('.crossword-cell').forEach(el => el.classList.remove('active-word', 'focused-cell'));
        document.querySelectorAll('.clue-item').forEach(el => el.classList.remove('active-clue'));

        if (specificClue) {
            const dir = specificClue.dir;
            const clue = specificClue.clue;
            document.querySelectorAll(`.crossword-cell input`).forEach(input => {
                const ir = input.dataset.r, ic = input.dataset.c;
                if (grid[ir][ic].clues[dir] === clue) input.parentElement.classList.add('active-word');
            });
            const clueEl = document.getElementById(`clue-${dir}-${clue.n}`);
            if (clueEl) clueEl.classList.add('active-clue');
        } else {
            const acrossClue = grid[r][c].clues.across;
            const downClue = grid[r][c].clues.down;
            if (acrossClue) {
                document.querySelectorAll(`.crossword-cell input`).forEach(input => {
                    const ir = input.dataset.r, ic = input.dataset.c;
                    if (grid[ir][ic].clues.across === acrossClue) input.parentElement.classList.add('active-word');
                });
                const clueEl = document.getElementById(`clue-across-${acrossClue.n}`);
                if (clueEl) clueEl.classList.add('active-clue');
            }
            if (downClue) {
                document.querySelectorAll(`.crossword-cell input`).forEach(input => {
                    const ir = input.dataset.r, ic = input.dataset.c;
                    if (grid[ir][ic].clues.down === downClue) input.parentElement.classList.add('active-word');
                });
                const clueEl = document.getElementById(`clue-down-${downClue.n}`);
                if (clueEl) clueEl.classList.add('active-clue');
            }
        }
        const focusedInput = document.querySelector(`input[data-r="${r}"][data-c="${c}"]`);
        if (focusedInput) focusedInput.parentElement.classList.add('focused-cell');
    }

    function handleInput(e, r, c) {
        e.target.parentElement.classList.remove('correct', 'incorrect');
        if (e.target.value) {
            currentDir === 'across' ? focusCell(r, c + 1) : focusCell(r + 1, c);
        }
    }

    function handleKeydown(e, r, c) {
        if (e.key === 'Backspace' && !e.target.value) {
            e.preventDefault();
            currentDir === 'across' ? focusCell(r, c - 1) : focusCell(r - 1, c);
        } else if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
            e.preventDefault();
            if (e.key === 'ArrowUp') focusCell(r - 1, c);
            if (e.key === 'ArrowDown') focusCell(r + 1, c);
            if (e.key === 'ArrowLeft') focusCell(r, c - 1);
            if (e.key === 'ArrowRight') focusCell(r, c + 1);
        }
    }

    function focusCell(r, c) {
        const el = document.querySelector(`input[data-r="${r}"][data-c="${c}"]`);
        if (el) el.focus();
    }

    function checkCrossword() {
        let allCorrect = true, filled = 0, total = 0;
        document.querySelectorAll('.crossword-cell:not(.block) input').forEach(input => {
            const r = parseInt(input.dataset.r), c = parseInt(input.dataset.c);
            const val = input.value.toUpperCase();
            let correctChar = '';
            if (grid[r][c].clues.across) {
                const start = findStartCell(grid[r][c].clues.across, 'across');
                correctChar = grid[r][c].clues.across.ans[c - start.c];
            } else if (grid[r][c].clues.down) {
                const start = findStartCell(grid[r][c].clues.down, 'down');
                correctChar = grid[r][c].clues.down.ans[r - start.r];
            }
            total++;
            if (val) {
                filled++;
                if (correctChar && val === correctChar.toUpperCase()) input.parentElement.classList.add('correct');
                else if (correctChar) { input.parentElement.classList.add('incorrect'); allCorrect = false; }
            } else { allCorrect = false; }
        });
        msgEl.textContent = filled === 0 ? "Start typing to check!" : (allCorrect && filled === total ? "Solved! 🎉" : "Keep trying!");
        msgEl.style.color = allCorrect && filled === total ? "#28a745" : "#dc3545";
    }

    function resetCrossword() {
        document.querySelectorAll('input').forEach(i => { i.value = ''; i.parentElement.classList.remove('correct', 'incorrect'); });
        msgEl.textContent = "";
    }

    init();
</script>
